# workflow name
name: Tests

# Controls when the action will run. Triggers the workflow on push or pull request
# events but only for the wanted branches
on:
  pull_request:
  push:
    branches: [master, main]

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  linux_tests:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # Test against the supported QGIS release line.
        docker_tags: ['3.40', '3.44', '4.0']
        fail-fast: false

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@v6
        with:
          submodules: true

      - uses: astral-sh/setup-uv@v6

      - name: Pull qgis
        run: docker pull qgis/qgis:${{ matrix.docker_tags }}

      - name: Generate CI requirements
        run: uv pip compile pyproject.toml --group ci --universal --python-version 3.10 -o requirements-dev.txt

      # Runs all tests
      - name: Run tests
        run: >
          docker run --rm --net=host --volume `pwd`:/app -w=/app -e QGIS_PLUGIN_IN_CI=1 qgis/qgis:${{ matrix.docker_tags }} sh -c
          "python3 -m venv --system-site-packages .ci-venv && . .ci-venv/bin/activate && pip install --upgrade pip && pip install -r requirements-dev.txt && xvfb-run -s '+extension GLX -screen 0 1024x768x24'
          pytest -v"

  windows_tests:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true

      - uses: astral-sh/setup-uv@v6

      - name: Choco install qgis
        uses: crazy-max/ghaction-chocolatey@v4
        with:
          args: install qgis-ltr -y

      - name: Generate CI requirements
        shell: pwsh
        run: uv pip compile pyproject.toml --group ci --python-version 3.8 -o requirements-dev.txt

      - name: Run tests
        shell: pwsh
        run: |
          $qgisRoots = @(
            'C:\ProgramData\chocolatey\bin',
            'C:\OSGeo4W\bin',
            'C:\OSGeo4W64\bin',
            'C:\Program Files'
          ) | Where-Object { Test-Path $_ }

          $qgisBat = $null
          foreach ($root in $qgisRoots) {
            $candidate = Get-ChildItem -Path $root -Filter 'python-qgis*.bat' -File -Recurse -ErrorAction SilentlyContinue |
              Sort-Object FullName |
              Select-Object -First 1
            if ($candidate) {
              $qgisBat = $candidate.FullName
              break
            }
          }

          if (-not $qgisBat) {
            throw "Could not locate a python-qgis launcher under: $($qgisRoots -join ', ')"
          }

          $env:PATH = "$(Split-Path $qgisBat);$env:PATH"
          $env:QGIS_PLUGIN_IN_CI=1

          & $qgisBat -m pip install -qr requirements-dev.txt
          & $qgisBat -m pytest -v

  pre-release:
    name: "Pre Release"
    runs-on: "ubuntu-latest"
    needs: [linux_tests, windows_tests]
    permissions:
      contents: write

    steps:
      - name: Print workflow debug context
        run: |
          printenv | sort
          cat "$GITHUB_EVENT_PATH"

      - name: Ensure PR pre-release exists
        if: ${{ github.event.pull_request }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPOSITORY: ${{ github.repository }}
          TAG: dev-pr
          TARGET: ${{ github.sha }}
          TITLE: Development Build made for PR #${{ github.event.number }}
        run: |
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release delete "$TAG" --yes
          fi

          gh api -X DELETE "repos/$REPOSITORY/git/refs/tags/$TAG" >/dev/null 2>&1 || true
          gh release create "$TAG" --target "$TARGET" --title "$TITLE" --notes "" --prerelease

      - name: Ensure branch pre-release exists
        if: ${{ github.event.after != github.event.before }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPOSITORY: ${{ github.repository }}
          TAG: dev
          TARGET: ${{ github.sha }}
          TITLE: Development Build made for master branch
        run: |
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release delete "$TAG" --yes
          fi

          gh api -X DELETE "repos/$REPOSITORY/git/refs/tags/$TAG" >/dev/null 2>&1 || true
          gh release create "$TAG" --target "$TARGET" --title "$TITLE" --notes "" --prerelease

      - uses: actions/checkout@v6
        with:
          submodules: true

      - name: Set up Python 3.8
        uses: actions/setup-python@v6
        with:
          python-version: '3.8'

      #    Needed if the plugin is using Transifex, to have the lrelease command
      #    - name: Install Qt lrelease
      #      run: sudo apt-get update && sudo apt-get install qt5-default qttools5-dev-tools

      - name: Install qgis-plugin-ci
        run: pip3 install qgis-plugin-ci

      # When Transifex is wanted: --transifex-token ${{ secrets.TRANSIFEX_TOKEN }}
      - name: Deploy plugin
        if: ${{ github.event.pull_request }}
        run: qgis-plugin-ci release dev-pr --github-token ${{ secrets.GITHUB_TOKEN }} --disable-submodule-update

        # When Transifex is wanted: --transifex-token ${{ secrets.TRANSIFEX_TOKEN }}
      - name: Deploy plugin
        if: ${{ github.event.after != github.event.before }}
        run: qgis-plugin-ci release dev --github-token ${{ secrets.GITHUB_TOKEN }} --disable-submodule-update
